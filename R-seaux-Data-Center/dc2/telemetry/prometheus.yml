global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'dc2-lab'
    environment: 'production'

scrape_configs:
  # Telegraf (gNMI collector)
  - job_name: 'telegraf'
    static_configs:
      - targets: ['telegraf:9273']
    metric_relabel_configs:
      # Relabel pour clarifier les sources
      - source_labels: [__name__]
        regex: 'gnmi_.*'
        action: 'keep'

  # Prometheus auto-scrape
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - '/etc/prometheus/rules/*.yml'
