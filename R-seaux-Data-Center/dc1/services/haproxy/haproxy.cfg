# HAProxy — DC1 Load Balancer
# Web : 172.20.1.40:80 → web1/web2/web3
# DNS : 172.20.1.40:53 → dns1/dns2

global
    log stdout format raw local0
    maxconn 4096
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    retries 3

# ---- Frontend Web ----
frontend web_front
    bind *:80
    default_backend web_servers

backend web_servers
    balance roundrobin
    option httpchk GET /
    server web1 172.20.1.10:80 check inter 5s
    server web2 172.20.1.11:80 check inter 5s
    server web3 172.20.1.12:80 check inter 5s

# ---- Frontend DNS (UDP) ----
frontend dns_front
    bind *:53
    mode tcp
    default_backend dns_servers

backend dns_servers
    mode tcp
    balance roundrobin
    server dns1 172.20.1.20:53 check
    server dns2 172.20.1.21:53 check

# ---- Stats page ----
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST
