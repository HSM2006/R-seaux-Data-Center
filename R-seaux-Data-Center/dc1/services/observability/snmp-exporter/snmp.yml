# snmp_exporter — IF-MIB + BGP4-MIB (SAE DevCloud 4D01)
# Compatible snmp_exporter v0.26+ (format indexes corrige)
auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  # ---------- Trafic par interface ----------
  if_mib:
    walk:
      - 1.3.6.1.2.1.2.2.1.7     # ifAdminStatus
      - 1.3.6.1.2.1.2.2.1.8     # ifOperStatus
      - 1.3.6.1.2.1.31.1.1.1.6  # ifHCInOctets
      - 1.3.6.1.2.1.31.1.1.1.10 # ifHCOutOctets
      - 1.3.6.1.2.1.2.2.1.14    # ifInErrors
      - 1.3.6.1.2.1.2.2.1.20    # ifOutErrors
      - 1.3.6.1.2.1.31.1.1.1.1  # ifName (pour le lookup)
    metrics:
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Total octets received (64-bit)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Total octets sent (64-bit)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: Interface operational status
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge

  # ---------- Etat BGP (BGP4-MIB) ----------
  # L'index de bgpPeerEntry est une IpAddress (4 octets dans l'OID).
  # snmp_exporter v0.30 ne reconnait pas "IpAddr" -> on utilise
  # 4 index gauge separes qui representent chaque octet de l'IP.
  bgp:
    walk:
      - 1.3.6.1.2.1.15.3.1.2    # bgpPeerState
      - 1.3.6.1.2.1.15.3.1.9    # bgpPeerRemoteAs
    metrics:
      - name: bgpPeerState
        oid: 1.3.6.1.2.1.15.3.1.2
        type: gauge
        help: BGP peer state (6 = established)
        indexes:
          - labelname: bgpPeerIP_a
            type: gauge
          - labelname: bgpPeerIP_b
            type: gauge
          - labelname: bgpPeerIP_c
            type: gauge
          - labelname: bgpPeerIP_d
            type: gauge
      - name: bgpPeerRemoteAs
        oid: 1.3.6.1.2.1.15.3.1.9
        type: gauge
        help: Remote AS of the BGP peer
        indexes:
          - labelname: bgpPeerIP_a
            type: gauge
          - labelname: bgpPeerIP_b
            type: gauge
          - labelname: bgpPeerIP_c
            type: gauge
          - labelname: bgpPeerIP_d
            type: gauge
