# Topologie DC1 — leaf & spine avec EVPN/VXLAN
# Single VNI 10100, tous les containers dans le même L2 étendu

name: dc1-evpn

topology:
  kinds:
    linux:
      image: frrouting/frr:latest
      binds:
        - /lib/modules:/lib/modules:ro
      # Capabilities nécessaires pour manipuler les bridges et VXLAN
      # dans le namespace réseau du container
      cap-add:
        - NET_ADMIN
        - SYS_ADMIN
        - NET_RAW

  nodes:
    # ----- SPINES -----
    spine1:
      kind: linux
      mgmt-ipv4: 172.20.20.101
      exec:
        - ip link set lo up
        - ip addr add 10.0.0.101/32 dev lo

    spine2:
      kind: linux
      mgmt-ipv4: 172.20.20.102
      exec:
        - ip link set lo up
        - ip addr add 10.0.0.102/32 dev lo

    # ----- LEAFS (VTEPs) -----
    leaf1:
      kind: linux
      mgmt-ipv4: 172.20.20.11
      exec:
        - ip link set lo up
        - ip addr add 10.0.0.1/32 dev lo

    leaf2:
      kind: linux
      mgmt-ipv4: 172.20.20.12
      exec:
        - ip link set lo up
        - ip addr add 10.0.0.2/32 dev lo

    leaf3:
      kind: linux
      mgmt-ipv4: 172.20.20.13
      exec:
        - ip link set lo up
        - ip addr add 10.0.0.3/32 dev lo

    # ----- CONTAINERS DE TEST -----
    # Tous dans le VNI 10100, subnet 10.202.1.0/25
    web1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.202.1.10/25 dev eth1
        - ip link set eth1 up

    web2:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.202.1.11/25 dev eth1
        - ip link set eth1 up

    dns1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 10.202.1.20/25 dev eth1
        - ip link set eth1 up

  links:
    # Mesh leaf-spine (chaque leaf connecté aux deux spines)
    - endpoints: ["leaf1:eth1", "spine1:eth1"]
    - endpoints: ["leaf1:eth2", "spine2:eth1"]
    - endpoints: ["leaf2:eth1", "spine1:eth2"]
    - endpoints: ["leaf2:eth2", "spine2:eth2"]
    - endpoints: ["leaf3:eth1", "spine1:eth3"]
    - endpoints: ["leaf3:eth2", "spine2:eth3"]

    # Containers branchés aux leafs (sur eth10 pour ne pas écraser uplinks)
    - endpoints: ["web1:eth1", "leaf1:eth10"]
    - endpoints: ["web2:eth1", "leaf2:eth10"]
    - endpoints: ["dns1:eth1", "leaf3:eth10"]
