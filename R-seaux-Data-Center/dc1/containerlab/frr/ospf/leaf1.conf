frr defaults traditional
hostname leaf1
no ipv6 forwarding
!
interface eth1
 ip address 172.16.0.1/31
 ip ospf area 0
 ip ospf network point-to-point
!
interface eth2
 ip address 172.16.0.7/31
 ip ospf area 0
 ip ospf network point-to-point
!
interface lo
 ip address 172.16.255.11/32
 ip ospf area 0
 ip ospf passive
!
router ospf
 ospf router-id 172.16.255.11
!
router bgp 65000
 bgp router-id 172.16.255.11
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 neighbor 172.16.255.1 remote-as 65000
 neighbor 172.16.255.1 update-source lo
 neighbor 172.16.255.2 remote-as 65000
 neighbor 172.16.255.2 update-source lo
 !
 address-family l2vpn evpn
  neighbor 172.16.255.1 activate
  neighbor 172.16.255.2 activate
  advertise-all-vni
 exit-address-family
!
line vty
!
