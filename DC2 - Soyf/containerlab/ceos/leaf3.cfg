

! Command: show running-config at line 2
! device: leaf3 (cEOSLab, EOS-4.33.1F-39879738.4331F (engineering build))
!
no aaa root
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname leaf3
!
spanning-tree mode mstp
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
vlan 40
   name VXLAN_BINOMES
!
vlan 200
   name SERVICES_DC2
!
interface Ethernet1
   no switchport
   ip address 172.16.1.5/31
!
interface Ethernet2
   no switchport
   ip address 172.16.1.11/31
!
interface Ethernet3
   switchport access vlan 40
!
interface Ethernet4
   switchport access vlan 200
!
interface Loopback0
   ip address 172.16.255.16/32
!
interface Loopback1
!
interface Management0
   ip address 172.20.20.4/24
!
interface Vlan40
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 40 vni 1040
   vxlan vlan 200 vni 10200
   vxlan vlan 40 flood vtep 10.255.0.3
   vxlan vlan 200 flood vtep 172.16.255.14 172.16.255.15
!
ip routing
!
router bgp 65000
   router-id 172.16.255.16
   no bgp default ipv4-unicast
   neighbor UNDERLAY peer group
   neighbor UNDERLAY remote-as 65000
   neighbor 172.16.1.4 peer group UNDERLAY
   neighbor 172.16.1.10 peer group UNDERLAY
   !
   vlan 40
      rd 172.16.255.16:40
      route-target both 65000:40
      redistribute learned
   !
   vlan 200
      rd 172.16.255.16:200
      route-target both 200:200
      redistribute learned
   !
   address-family evpn
      neighbor UNDERLAY activate
   !
   address-family ipv4
      neighbor UNDERLAY activate
      network 10.192.1.0/24
      network 172.16.255.16/32
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
end

username admin privilege 15 secret admin123
management api gnmi
   transport grpc default
!
