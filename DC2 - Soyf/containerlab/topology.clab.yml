# ============================================================
# SAE DevCloud 4D01 — DC2 Containerlab Topology (Arista cEOS)
# v4 : connexion eBGP VM <-> spine1 et spine2 (AS 65002 pour la VM)
#      VM Debian devient nœud BGP, apprend 172.20.2.0/24 dynamiquement,
#      annonce 10.202.0.0/16 aux spines (reseau salle).
# ============================================================
name: dc2-evpn

topology:
  nodes:
    spine1:
      kind: ceos
      image: registry.iutbeziers.fr/ceos:4.33.1F
      startup-config: ceos/spine1.cfg

    spine2:
      kind: ceos
      image: registry.iutbeziers.fr/ceos:4.33.1F
      startup-config: ceos/spine2.cfg

    leaf1:
      kind: ceos
      image: registry.iutbeziers.fr/ceos:4.33.1F
      startup-config: ceos/leaf1.cfg

    leaf2:
      kind: ceos
      image: registry.iutbeziers.fr/ceos:4.33.1F
      startup-config: ceos/leaf2.cfg

    leaf3:
      kind: ceos
      image: registry.iutbeziers.fr/ceos:4.33.1F
      startup-config: ceos/leaf3.cfg

    web1:
      kind: linux
      image: nginx:alpine
      exec:
        - ip addr add 172.20.2.10/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 172.20.2.254
        - "sh -c 'echo \"<h1>DC2 - Web1 - leaf1</h1>\" > /usr/share/nginx/html/index.html'"

    dns1:
      kind: linux
      image: alpine:latest
      cmd: sleep infinity
      binds:
        - ../services/unbound/unbound.conf:/etc/unbound/unbound.conf
      exec:
        - apk add --no-cache unbound
        - ip addr add 172.20.2.20/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 172.20.2.254
        - unbound -c /etc/unbound/unbound.conf

    web2:
      kind: linux
      image: nginx:alpine
      exec:
        - ip addr add 172.20.2.11/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 172.20.2.254
        - "sh -c 'echo \"<h1>DC2 - Web2 - leaf2</h1>\" > /usr/share/nginx/html/index.html'"

    dns2:
      kind: linux
      image: alpine:latest
      cmd: sleep infinity
      binds:
        - ../services/unbound/unbound.conf:/etc/unbound/unbound.conf
      exec:
        - apk add --no-cache unbound
        - ip addr add 172.20.2.21/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 172.20.2.254
        - unbound -c /etc/unbound/unbound.conf

    web3:
      kind: linux
      image: nginx:alpine
      exec:
        - ip addr add 10.192.1.22/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 10.192.1.1
        - "sh -c 'echo \"<h1>DC2 - Web3 - leaf3</h1>\" > /usr/share/nginx/html/index.html'"

    samba:
      kind: linux
      image: dockurr/samba
      exec:
        - ip addr add 172.20.2.30/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 172.20.2.254

    br-catalyst:
      kind: bridge
    br-mikrotik:
      kind: bridge

  links:
    # Full mesh spine-leaf (underlay)
    - endpoints: [spine1:eth1, leaf1:eth1]
    - endpoints: [spine1:eth2, leaf2:eth1]
    - endpoints: [spine1:eth3, leaf3:eth1]
    - endpoints: [spine2:eth1, leaf1:eth2]
    - endpoints: [spine2:eth2, leaf2:eth2]
    - endpoints: [spine2:eth3, leaf3:eth2]
    # Services
    - endpoints: [leaf1:eth3, web1:eth1]
    - endpoints: [leaf1:eth4, dns1:eth1]
    - endpoints: [leaf2:eth3, web2:eth1]
    - endpoints: [leaf2:eth4, dns2:eth1]
    - endpoints: [leaf3:eth3, web3:eth1]
    - endpoints: [leaf3:eth4, samba:eth1]
    # Connexion eBGP host <-> spines (v4)
    # VM Debian = AS 65002, spines = AS 65000
    # P2P 172.16.2.0/30 (VM<->spine1), 172.16.2.4/30 (VM<->spine2)
    #- endpoints: ["host:veth-spine1", "spine1:eth4"]
    #- endpoints: ["host:veth-spine2", "spine2:eth4"]
    - endpoints: [spine1:eth4, br-catalyst:eth1]
    - endpoints: [spine2:eth4, br-mikrotik:eth2]
mgmt:
  network: clab-mgmt-dc2
  ipv4-subnet: 172.20.20.0/24
