[global_tags]
  datacenter = "dc2"
  environment = "lab"

[agent]
  interval = "30s"
  flush_interval = "10s"
  hostname = "telegraf"

[[inputs.gnmi]]
  addresses = [
    "clab-dc2-evpn-spine1:6030",
    "clab-dc2-evpn-spine2:6030",
    "clab-dc2-evpn-leaf1:6030",
    "clab-dc2-evpn-leaf2:6030",
    "clab-dc2-evpn-leaf3:6030"
  ]
  username = "admin"
  password = "admin123"
  
  [[inputs.gnmi.subscription]]
    name = "bgp_global"
    path = "/network-instances/network-instance[name=default]/protocols/protocol[identifier=BGP]/bgp/global/state"
    subscription_mode = "SAMPLE"
  
  [[inputs.gnmi.subscription]]
    name = "interfaces"
    path = "/interfaces"
    subscription_mode = "SAMPLE"

[[outputs.prometheus_client]]
  listen = ":9273"
