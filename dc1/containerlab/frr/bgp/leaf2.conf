frr defaults traditional
hostname leaf2
no ipv6 forwarding
!
interface eth1
 description spine1
 ip address 172.16.0.3/31
!
interface eth2
 description spine2
 ip address 172.16.0.9/31
!
interface lo
 ip address 172.16.255.12/32
!
router bgp 65000
 bgp router-id 172.16.255.12
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 neighbor 172.16.255.1 remote-as 65000
 neighbor 172.16.255.1 update-source lo
 neighbor 172.16.255.2 remote-as 65000
 neighbor 172.16.255.2 update-source lo
 !
 address-family ipv4 unicast
  network 172.16.255.12/32
  neighbor 172.16.255.1 activate
  neighbor 172.16.255.2 activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 172.16.255.1 activate
  neighbor 172.16.255.2 activate
  advertise-all-vni
 exit-address-family
!
! Bootstrap : joindre les loopbacks des spines pour monter l'iBGP
ip route 172.16.255.1/32 172.16.0.2
ip route 172.16.255.2/32 172.16.0.8
!
line vty
!
