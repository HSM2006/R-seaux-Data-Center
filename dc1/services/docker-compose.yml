# ============================================================
# Services DC1 — conteneurs sur le host
# Tous dans le réseau 172.20.1.0/24 via macvlan sur br10100
# Auteur : Houssam
# Usage : docker compose up -d
# ============================================================

version: "3.8"

# Réseau macvlan branché sur br-svc (bridge côté host créé par setup-vtep.sh)
# br10100 n'existe que dans le namespace des leafs — br-svc est le pont host.
networks:
  fabric:
    driver: macvlan
    driver_opts:
      parent: br-svc
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.254

services:
  # ---- HAProxy — load balancer web + DNS ----
  haproxy:
    image: haproxy:2.8-alpine
    container_name: dc1-haproxy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      fabric:
        ipv4_address: 172.20.1.40
    restart: unless-stopped

  # ---- Uptime Kuma — monitoring services ----
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: dc1-uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      fabric:
        ipv4_address: 172.20.1.50
    restart: unless-stopped

  # ---- Oxidized — backup configs réseau ----
  oxidized:
    image: oxidized/oxidized:latest
    container_name: dc1-oxidized
    volumes:
      - ./oxidized/config:/home/oxidized/.config/oxidized/config
      - ./oxidized/router.db:/home/oxidized/.config/oxidized/router.db
      - oxidized-data:/home/oxidized/.config/oxidized
    networks:
      fabric:
        ipv4_address: 172.20.1.60
    environment:
      CONFIG_RELOAD_INTERVAL: "3600"
    restart: unless-stopped

volumes:
  uptime-kuma-data:
  oxidized-data:
