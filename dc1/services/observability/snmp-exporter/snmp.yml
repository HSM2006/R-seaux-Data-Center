# ============================================================
# snmp_exporter — modules IF-MIB + BGP4-MIB (SAE DevCloud 4D01)
# Prometheus interroge snmp_exporter, qui interroge les leafs/spines
# en SNMP v2c (communauté public) et expose les métriques.
#   module if_mib : trafic par interface (débit) -> Grafana
#   module bgp    : état des sessions BGP (peer up/down) -> Grafana
# ============================================================
auths:
  public_v2:
    community: public
    security_level: noAuthNoPriv
    version: 2

modules:
  # ---------- Trafic par interface ----------
  if_mib:
    walk:
      - 1.3.6.1.2.1.2.2.1.7    # ifAdminStatus
      - 1.3.6.1.2.1.2.2.1.8    # ifOperStatus
      - 1.3.6.1.2.1.31.1.1.1.6   # ifHCInOctets
      - 1.3.6.1.2.1.31.1.1.1.10  # ifHCOutOctets
      - 1.3.6.1.2.1.2.2.1.14   # ifInErrors
      - 1.3.6.1.2.1.2.2.1.20   # ifOutErrors
    metrics:
      - name: ifOperStatus
        oid: 1.3.6.1.2.1.2.2.1.8
        type: gauge
        help: The current operational state of the interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifAdminStatus
        oid: 1.3.6.1.2.1.2.2.1.7
        type: gauge
        help: The desired state of the interface
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifHCInOctets
        oid: 1.3.6.1.2.1.31.1.1.1.6
        type: counter
        help: Octets received on the interface (64-bit)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifHCOutOctets
        oid: 1.3.6.1.2.1.31.1.1.1.10
        type: counter
        help: Octets sent on the interface (64-bit)
        indexes:
          - labelname: ifIndex
            type: gauge
        lookups:
          - labels: [ifIndex]
            labelname: ifName
            oid: 1.3.6.1.2.1.31.1.1.1.1
            type: DisplayString
      - name: ifInErrors
        oid: 1.3.6.1.2.1.2.2.1.14
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge
      - name: ifOutErrors
        oid: 1.3.6.1.2.1.2.2.1.20
        type: counter
        indexes:
          - labelname: ifIndex
            type: gauge

  # ---------- État BGP (BGP4-MIB) ----------
  bgp:
    walk:
      - 1.3.6.1.2.1.15.3.1.2    # bgpPeerState
      - 1.3.6.1.2.1.15.3.1.9    # bgpPeerRemoteAs
    metrics:
      - name: bgpPeerState
        oid: 1.3.6.1.2.1.15.3.1.2
        type: gauge
        help: BGP peer connection state (6 = established)
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: IpAddr
      - name: bgpPeerRemoteAs
        oid: 1.3.6.1.2.1.15.3.1.9
        type: gauge
        help: Remote AS of the BGP peer
        indexes:
          - labelname: bgpPeerRemoteAddr
            type: IpAddr
