# ============================================================
# Stack Observabilité DC1
# Prometheus + Grafana + gNMIc + sFlow collector
# Auteur : Houssam
# Usage : docker compose up -d
# ============================================================

version: "3.8"

networks:
  fabric:
    driver: macvlan
    driver_opts:
      parent: br10100
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.254
  obs-internal:
    driver: bridge

services:
  # ---- Prometheus — collecte métriques ----
  prometheus:
    image: prom/prometheus:latest
    container_name: dc1-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      obs-internal:
      fabric:
        ipv4_address: 172.20.1.80
    restart: unless-stopped

  # ---- Grafana — dashboards ----
  grafana:
    image: grafana/grafana:latest
    container_name: dc1-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: DevCloud2025!
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      obs-internal:
      fabric:
        ipv4_address: 172.20.1.81
    depends_on:
      - prometheus
    restart: unless-stopped

  # ---- gNMIc — collecte telémétrie réseau ----
  gnmic:
    image: ghcr.io/openconfig/gnmic:latest
    container_name: dc1-gnmic
    volumes:
      - ./gnmic/gnmic.yml:/app/gnmic.yml:ro
    command: ["subscribe", "--config", "/app/gnmic.yml"]
    networks:
      obs-internal:
    restart: unless-stopped

  # ---- sFlow collector (sflowtool) ----
  sflow-collector:
    image: networkstatic/sflowtool:latest
    container_name: dc1-sflow
    command: ["-p", "6343", "-l"]
    ports:
      - "6343:6343/udp"
    networks:
      obs-internal:
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
