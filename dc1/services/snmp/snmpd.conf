# ============================================================
# snmpd — leafs & spines FRR (SAE DevCloud 4D01)
# Expose IF-MIB (compteurs d'interface = trafic) en SNMP v2c
# + AgentX maître pour que FRR (bgpd/zebra/ospfd -M snmp) publie
#   BGP4-MIB / OSPF-MIB / ipForward-MIB => "voir les routes" en SNMP
# Communauté lecture seule : public (réseau salle + observabilité)
# ============================================================

# Écoute SNMP sur le port standard 161 (toutes interfaces du container)
agentaddress udp:161

# --- AgentX : snmpd = maître, FRR = sous-agent ---
master agentx
agentXSocket tcp:127.0.0.1:705
agentXTimeout 15

# --- Accès lecture seule ---
rocommunity public default
rocommunity public 172.20.0.0/12
rocommunity public 10.202.0.0/16
rocommunity public 172.16.0.0/16

# --- Infos système (apparaissent dans Nautobot / Grafana) ---
sysLocation  DC1 - SAE DevCloud 4D01
sysContact   houssam@dc1.local
sysServices  72

# --- Vue : tout l'arbre (IF-MIB + BGP4-MIB) en lecture ---
view    all     included    .1    80
rocommunity public default -V all
