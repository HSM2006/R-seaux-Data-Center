# ============================================================
# Nautobot — Source de vérité réseau (commun à tous les groupes)
# Auteur : Houssam
# Accès : http://172.20.1.70:8080
# ============================================================

version: "3.8"

networks:
  fabric:
    driver: macvlan
    driver_opts:
      parent: br10100
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.254
  nautobot-internal:

services:
  nautobot:
    image: networktocode/nautobot:stable
    container_name: dc1-nautobot
    env_file:
      - nautobot.env
    volumes:
      - nautobot-static:/opt/nautobot/static
    networks:
      nautobot-internal:
      fabric:
        ipv4_address: 172.20.1.70
    depends_on:
      - nautobot-db
      - nautobot-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 5

  nautobot-worker:
    image: networktocode/nautobot:stable
    container_name: dc1-nautobot-worker
    env_file:
      - nautobot.env
    command: nautobot-server celery worker -l INFO
    networks:
      nautobot-internal:
    depends_on:
      - nautobot-db
      - nautobot-redis
    restart: unless-stopped

  nautobot-db:
    image: postgres:14
    container_name: dc1-nautobot-db
    environment:
      POSTGRES_DB: nautobot
      POSTGRES_USER: nautobot
      POSTGRES_PASSWORD: DevCloud2025!
    volumes:
      - nautobot-db:/var/lib/postgresql/data
    networks:
      nautobot-internal:
    restart: unless-stopped

  nautobot-redis:
    image: redis:7-alpine
    container_name: dc1-nautobot-redis
    networks:
      nautobot-internal:
    restart: unless-stopped

volumes:
  nautobot-db:
  nautobot-static:
