! ============================================================
! leaf1 — VTEP DC1
! AS 65001 — Loopback 10.0.0.1
! VNI 10100 (single VNI fabric)
! ============================================================

frr defaults datacenter
hostname leaf1
log syslog informational
!
! ----- Interfaces underlay -----
interface lo
 ip address 10.0.0.1/32
!
interface eth1
 description vers-spine1
!
interface eth2
 description vers-spine2
!
! ----- BGP -----
! Underlay : eBGP IPv4 vers les deux spines (annonce loopback)
! Overlay  : eBGP EVPN vers les deux spines (annonce les MAC/IP locales)
!
router bgp 65001
 bgp router-id 10.0.0.1
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 !
 ! Peer-group commun aux deux spines
 neighbor SPINES peer-group
 neighbor SPINES remote-as external
 neighbor SPINES capability extended-nexthop
 !
 ! BGP unnumbered : on appaire via les interfaces directement,
 ! pas besoin d'IPs sur les liens leaf-spine
 neighbor eth1 interface peer-group SPINES
 neighbor eth2 interface peer-group SPINES
 !
 ! ----- Underlay : annonce de la loopback -----
 address-family ipv4 unicast
  neighbor SPINES activate
  redistribute connected route-map LOOPBACK-ONLY
 exit-address-family
 !
 ! ----- Overlay : EVPN -----
 address-family l2vpn evpn
  neighbor SPINES activate
  advertise-all-vni
 exit-address-family
!
! Filtre pour ne redistribuer que la loopback en underlay
route-map LOOPBACK-ONLY permit 10
 match interface lo
!
line vty
!
