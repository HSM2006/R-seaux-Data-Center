! ============================================================
! spine1 — relais EVPN (pas VTEP)
! AS 65100 — Loopback 10.0.0.101
! Transit underlay + propagation EVPN entre tous les leafs
! ============================================================

frr defaults datacenter
hostname spine1
log syslog informational
!
! ----- Interfaces underlay -----
interface lo
 ip address 10.0.0.101/32
!
interface eth1
 description vers-leaf1
!
interface eth2
 description vers-leaf2
!
interface eth3
 description vers-leaf3
!
! ----- BGP -----
! eBGP vers les 3 leafs, en IPv4 (underlay) et en EVPN (overlay)
!
router bgp 65100
 bgp router-id 10.0.0.101
 no bgp default ipv4-unicast
 bgp bestpath as-path multipath-relax
 !
 neighbor LEAFS peer-group
 neighbor LEAFS remote-as external
 neighbor LEAFS capability extended-nexthop
 !
 neighbor eth1 interface peer-group LEAFS
 neighbor eth2 interface peer-group LEAFS
 neighbor eth3 interface peer-group LEAFS
 !
 ! ----- Underlay -----
 address-family ipv4 unicast
  neighbor LEAFS activate
  redistribute connected route-map LOOPBACK-ONLY
 exit-address-family
 !
 ! ----- Overlay EVPN -----
 ! En eBGP le next-hop est réécrit par défaut. Pour EVPN on veut
 ! garder le VTEP source (loopback du leaf) comme next-hop, sinon
 ! le trafic VXLAN n'arrive jamais au bon endroit.
 address-family l2vpn evpn
  neighbor LEAFS activate
  neighbor LEAFS route-map NEXTHOP-UNCHANGED out
 exit-address-family
!
route-map LOOPBACK-ONLY permit 10
 match interface lo
!
route-map NEXTHOP-UNCHANGED permit 10
 set ip next-hop unchanged
!
line vty
!
