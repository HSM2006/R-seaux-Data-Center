# ============================================================
# Unbound DNS — DC1 (SAE DevCloud 4D01)
# Conf durcie pour tourner dans un container Alpine minimal.
# ============================================================
server:
    # --- Spécifique container : pas de chroot, pas de drop de privilèges ---
    # Sans ça, unbound tente un chroot vers /etc/unbound et un setuid vers
    # l'utilisateur "unbound" — ce qui échoue dans une image minimale et fait
    # qu'unbound "démarre puis meurt". C'était la cause du DNS instable.
    username: ""
    chroot: ""
    directory: "/etc/unbound"
    pidfile: "/run/unbound.pid"
    use-syslog: no
    logfile: ""
    verbosity: 1

    interface: 0.0.0.0
    port: 53
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Réseaux autorisés à interroger
    access-control: 172.20.0.0/12 allow
    access-control: 10.202.0.0/16 allow
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Cache
    cache-max-ttl: 86400
    cache-min-ttl: 0
    neg-cache-size: 4m

    # Sécurité
    hide-identity: yes
    hide-version: yes

    # ----- Zone interne dc1.local -----
    local-zone: "dc1.local." static
    local-data: "web.dc1.local.        IN A 172.20.1.40"
    local-data: "web1.dc1.local.       IN A 172.20.1.10"
    local-data: "web2.dc1.local.       IN A 172.20.1.11"
    local-data: "web3.dc1.local.       IN A 172.20.1.12"
    local-data: "dns1.dc1.local.       IN A 172.20.1.20"
    local-data: "dns2.dc1.local.       IN A 172.20.1.21"
    local-data: "haproxy.dc1.local.    IN A 172.20.1.40"
    local-data: "samba.dc1.local.      IN A 172.20.1.30"
    local-data: "monitoring.dc1.local. IN A 172.20.1.50"
    local-data: "nautobot.dc1.local.   IN A 172.20.1.70"
    local-data: "prometheus.dc1.local. IN A 172.20.1.80"
    local-data: "grafana.dc1.local.    IN A 172.20.1.81"
    # Reverse de quelques services
    local-data-ptr: "172.20.1.10 web1.dc1.local"
    local-data-ptr: "172.20.1.40 web.dc1.local"

# ----- Résolution récursive vers l'extérieur -----
forward-zone:
    name: "."
    forward-addr: 8.8.8.8
    forward-addr: 1.1.1.1
