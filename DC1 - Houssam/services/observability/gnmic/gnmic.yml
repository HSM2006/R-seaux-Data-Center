# gNMIc — Telemetrie réseau DC1
# Note : FRR n'a pas de serveur gNMI natif.
# Ce fichier est prêt pour le DC2 Arista cEOS du binôme.
# IPs mgmt Containerlab (172.20.20.x) au lieu des loopbacks.
targets:
  "172.20.20.11:57400":
    username: admin
    password: CHANGEME  # fichier pret pour DC2 Arista, pas encore branche sur du reel
    skip-verify: true
    subscriptions:
      - sub1
  "172.20.20.12:57400":
    username: admin
    password: CHANGEME  # fichier pret pour DC2 Arista, pas encore branche sur du reel
    skip-verify: true
    subscriptions:
      - sub1
  "172.20.20.13:57400":
    username: admin
    password: CHANGEME  # fichier pret pour DC2 Arista, pas encore branche sur du reel
    skip-verify: true
    subscriptions:
      - sub1

subscriptions:
  sub1:
    paths:
      - /interfaces/interface/state/counters
      - /network-instances/network-instance/protocols/protocol/bgp/neighbors
    mode: stream
    stream-mode: sample
    sample-interval: 10s
    encoding: json_ietf

outputs:
  prom:
    type: prometheus
    listen: :9804
    path: /metrics
    expiration: 5m
