frr defaults traditional
hostname spine1
no ipv6 forwarding
!
interface eth1
 description leaf1
 ip address 172.16.0.0/31
!
interface eth2
 description leaf2
 ip address 172.16.0.2/31
!
interface eth3
 description leaf3
 ip address 172.16.0.4/31
!
interface eth4
 description vers-catalyst
 ip address 10.202.1.201/16
!
interface lo
 ip address 172.16.255.1/32
!
! iBGP AS 65000 — spine1 est Route Reflector pour les leafs
! eBGP AS 65001 — session vers le Catalyst (border router)
router bgp 65000
 bgp router-id 172.16.255.1
 bgp log-neighbor-changes
 no bgp ebgp-requires-policy
 !
 ! -- iBGP vers les leafs --
 neighbor 172.16.255.11 remote-as 65000
 neighbor 172.16.255.11 update-source lo
 neighbor 172.16.255.12 remote-as 65000
 neighbor 172.16.255.12 update-source lo
 neighbor 172.16.255.13 remote-as 65000
 neighbor 172.16.255.13 update-source lo
 !
 ! -- eBGP vers le Catalyst --
 neighbor 10.202.1.12 remote-as 65001
 neighbor 10.202.1.12 description catalyst8000
 !
 address-family ipv4 unicast
  network 172.16.255.1/32
  ! leafs : RR client + next-hop-self force
  neighbor 172.16.255.11 activate
  neighbor 172.16.255.11 route-reflector-client
  neighbor 172.16.255.11 next-hop-self force
  neighbor 172.16.255.12 activate
  neighbor 172.16.255.12 route-reflector-client
  neighbor 172.16.255.12 next-hop-self force
  neighbor 172.16.255.13 activate
  neighbor 172.16.255.13 route-reflector-client
  neighbor 172.16.255.13 next-hop-self force
  ! Catalyst : n'annoncer que le préfixe services
  neighbor 10.202.1.12 activate
  neighbor 10.202.1.12 route-map TO-BORDER out
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 172.16.255.11 activate
  neighbor 172.16.255.11 route-reflector-client
  neighbor 172.16.255.12 activate
  neighbor 172.16.255.12 route-reflector-client
  neighbor 172.16.255.13 activate
  neighbor 172.16.255.13 route-reflector-client
 exit-address-family
!
! Filtre : on n'annonce que 172.20.1.0/24 vers les border routers
! pas les loopbacks internes ni les P2P /31
ip prefix-list SERVICES seq 10 permit 172.20.1.0/24
!
route-map TO-BORDER permit 10
 match ip address prefix-list SERVICES
!
! Routes statiques bootstrap pour joindre les loopbacks des leafs
ip route 172.16.255.11/32 172.16.0.1
ip route 172.16.255.12/32 172.16.0.3
ip route 172.16.255.13/32 172.16.0.5
!
line vty
!
