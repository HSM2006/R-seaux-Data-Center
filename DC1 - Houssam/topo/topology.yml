name: dc1topo

provider: clab
module: [ bgp ]

defaults:
  device: frr
  devices:
    frr:
      clab:
        image: frrouting/frr:latest

bgp:
  as: 65001

nodes:
  spine1:
    bgp.as: 65100
  spine2:
    bgp.as: 65100
  leaf1:
    bgp.as: 65001
  leaf2:
    bgp.as: 65002
  leaf3:
    bgp.as: 65003

links:
  - spine1-leaf1
  - spine1-leaf2
  - spine1-leaf3
  - spine2-leaf1
  - spine2-leaf2
  - spine2-leaf3
